<header class="navbar bg-base-200">
  <div class="flex-1">
    <h1 class="text-2xl font-bold">🎮 Jeu du Pendu</h1>
  </div>
  <div class="flex-none gap-2">
    <div class="stats shadow">
      <div class="stat stat-compact">
        <div class="stat-title">Erreurs</div>
        <div class="stat-value text-2xl" id="errors">
          {{ gameData.nb_errors }}/{{ gameData.ERRORS_MAX }}
        </div>
      </div>
      <div class="stat stat-compact">
        <div class="stat-title">Record</div>
        <div class="stat-value text-2xl" id="record">{{ gameData.record }}</div>
      </div>
    </div>
  </div>
</header>

<main class="main-grid">
  <router-outlet />
</main>
